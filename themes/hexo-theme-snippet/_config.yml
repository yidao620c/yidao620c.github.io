  <p>
    <b>最近动态</b>：下个月去巴厘岛旅行，有同路的么<br/>
  </p>

## 社交设置
social:
 - name: GitHub
   icon: github
   href: https://github.com/yidao620c
 - name: 微博
   icon: weibo
   href: https://www.weibo.com/yidao620
 - name: 邮箱
   icon: envelope-o
   href: mailto:yidao620@gmail.com
 - name: RSS
   icon: feed
   href: /atom.xml

## 文章分类设置
cate_config:
   show_count: true
   show_current: true

## 文章归档设置
arch_config:
   type: 'monthly'
   format: 'YYYY年MM月'
   show_count: true
   order: -1

## 标签云设置
tagcloud:
  tag3d: false
  textColour: '#444'
  outlineMethod: 'block'
  outlineColour: '#FFDAB9'
  interval: 30
  freezeActive: true
  frontSelect: true
  reverse: true
  wheelZoom: false

## 友链设置
links:
